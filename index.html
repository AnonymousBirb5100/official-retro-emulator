<!DOCTYPE html>
<html>
    <head>
        <title>Retro Game Emulator | BirdHub</title>
        <link rel = icon href = docs/favicon.ico sizes = "16x16 32x32 48x48 64x64" type = image/vnd.microsoft.icon>
        <meta name = viewport content = "width = device-width, initial-scale = 1">

        <style>
             body, html {
                height: 100%;
                overflow: hidden;
            }

            body {
                margin: 0;
                background: #000;
                overflow: hidden;
            }

            body, #box, #top {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            /*stuff I added*/

            .title {
                font-family: 'calibri';
                color: white;
                font-size: 3vw;
                line-height: 0;
            }

            .subtitle {
                font-family: 'calibri';
                color: white;
                font-size: 1.5vw;
                line-height: 3vh;
                font-weight: normal;
            }
            
            .row-container {
                display: flex;
                flex-direction: row;
                align-items: center;
            }

            a {
                text-decoration: none;
                color: rgb(0, 165, 231);
                font-family: 'calibri';
                font-size: 1.5vw;
                text-decoration: underline;
                padding-left: 1vw;
                padding-right: 1vw;
            }
            a:hover {
                color: rgb(0, 119, 231)
            }




            #box {
                color: #aaa;
                height: 40vh;
                width: 50vw;
                max-width: 80%;
                max-height: 80%;
                background-color: #333;
                border-radius: 0.4em;
                border: 2px solid #555;
                position: relative;
                flex-direction: column;
                transition-duration: 0.2s;
                overflow: hidden;
                font-family: 'calibri';
                font-weight: bold;
                font-size: 1.3vw;
                margin: 5px;
                text-align: center;
                padding: 10px;
            }

            #box:hover, #box[drag] {
                border-color: #1AAFFF;
                color: #ddd
            }

            #input {
                cursor: pointer;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                opacity: 0;
            }

            #display {
                width: 100%;
                height: 100%
            }

            select, button {
                padding: 0.6em 0.4em;
                margin: 0.5em;
                width: 15em;
                max-width: 100%;
                font-family: monospace;
                font-weight: bold;
                font-size: 16px;
                background-color: #444;
                color: #aaa;
                border-radius: 0.4em;
                border: 1px solid #555;
                cursor: pointer;
                transition-duration: 0.2s
            }

            select:hover, button:hover {
                background-color: #666;
                color: #ddd
            }

            .logo {
                width: 3vw;
                height: 3vw;
                filter: drop-shadow(0 0 2px white);
                padding-right: 0.5vw;
            }

            #top {
                margin: 5px;
            }

            /* BG Effect (Generated by AI) */
            #bgfx-retro-canvas {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100vh;
                z-index: -2;
            }
            .bgfx-scanlines {
                position: fixed;
                inset: 0;
                pointer-events: none;
                background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 1px,
                rgba(0,0,0,0) 2px
                );
                z-index: -1;
            }
            .bgfx-crt-grid {
                position: fixed;
                inset: 0;
                pointer-events: none;
                background: 
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
                background-size: 4px 4px;
                z-index: -1;
            }
        </style>
    </head>

    <body>
        <div id="top">
            <div class="row-container">
                <img style="width:4vw;height:4vw;padding-right:1vw;padding-bottom:0.3vw;"
                src="docs/birdhub-logo.png"/>
                <h1 class="title">BirdHub Retro Emulator</h1>
            </div>

            <h3 class="subtitle">Supports 30+ legacy consoles and arcade machines</h3>

            <div class="row-container">
                <img src="docs/Logo-light.png" alt="Logo" class="logo">
                <h3 class="subtitle" style="color: #3aceec">Powered by EmulatorJS</h3>
            </div>
            <br>

            <div class="row-container">
                <a href="https://github.com/emulatorjs/emulatorjs" target="_blank">EmulatorJS Github Repo</a>
                <a href="https://github.com/anonymousbirb5100/official-retro-emulator" target="_blank">BirdHub Emulator Github Repo</a>
                <a href="https://github.com/anonymousbirb5100/official-retro-emulator/docs/introduction.md" target="_blank">Instructions</a>
            </div>
        </div>
        <div id="box">
            <input type="file" id ="input" title="Upload" />
            Drag ROM file or click here
        </div>

        <!--BGFX-->
        <canvas id="bgfx-retro-canvas"></canvas>
        <div class="bgfx-scanlines"></div>
        <div class="bgfx-crt-grid"></div>

        <script>

            //I have no idea what this does
            let enableDebug = false;
            let enableThreads = false;
            let browserMode;
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            if (parseInt(urlParams.get("debug")) === 1 || urlParams.get("debug") === "true") {
                enableDebug = true;
                console.log("Debug is enabled");
            } else {
                console.log("Debug is disabled");
            }

            if (parseInt(urlParams.get("threads")) === 1 || urlParams.get("threads") === "true") {
                if (window.SharedArrayBuffer) {
                    enableThreads = true;
                    console.log("Threads are enabled");
                } else {
                    console.warn("Threads are disabled as SharedArrayBuffer is not available. Threads requires two headers to be set when sending you html page. See https://stackoverflow.com/a/68630724");
                    console.log("Threads are disabled");
                }
            } else {
                console.log("Threads are disabled");
            }

            if (urlParams.get("browserMode")) {
                browserMode = urlParams.get("browserMode");
            }

            if (urlParams.get("rom")) {
                console.log(`Loading ROM from URL: roms/${urlParams.get("rom")}`);
                run(false, urlParams.get("rom"));
            }

            async function run(upload, file) {
                const url = upload ? input.files[0] : `roms/${file}`;
                const parts = upload ? input.files[0].name.split(".") : file.split(".");

                const core = await (async (ext) => {
                    if (["fds", "nes", "unif", "unf"].includes(ext))
                        return "nes"

                    if (["smc", "fig", "sfc", "gd3", "gd7", "dx2", "bsx", "swc"].includes(ext))
                        return "snes"

                    if (["z64", "n64"].includes(ext))
                        return "n64"

                    if (["pce"].includes(ext))
                        return "pce"

                    if (["ngp", "ngc"].includes(ext))
                        return "ngp"

                    if (["ws", "wsc"].includes(ext))
                        return "ws"

                    if (["col", "cv"].includes(ext))
                        return "coleco"

                    if (["d64"].includes(ext))
                        return "vice_x64sc"
                    
                    if (["md", "sg", "smd", "gen"].includes(ext))
                        return "segaMD"

                    if (["nds", "gba", "gb", "z64", "n64"].includes(ext))
                        return ext

                    return await new Promise(resolve => {
                        var coreValues = {
                            "Nintendo 64": "n64",
                            "Nintendo Game Boy": "gb",
                            "Nintendo Game Boy Advance": "gba",
                            "Nintendo DS": "nds",
                            "Nintendo Entertainment System": "nes",
                            "Super Nintendo Entertainment System": "snes",
                            "PlayStation": "psx",
                            "Virtual Boy": "vb",
                            "Sega Mega Drive": "segaMD",
                            "Sega Master System": "segaMS",
                            "Sega CD": "segaCD",
                            "Atari Lynx": "lynx",
                            "Sega 32X": "sega32x",
                            "Atari Jaguar": "jaguar",
                            "Sega Game Gear": "segaGG",
                            "Sega Saturn": "segaSaturn",
                            "Atari 7800": "atari7800",
                            "Atari 2600": "atari2600",
                            "Arcade": "arcade",
                            "NEC TurboGrafx-16/SuperGrafx/PC Engine": "pce",
                            "NEC PC-FX": "pcfx",
                            "SNK NeoGeo Pocket (Color)": "ngp",
                            "Bandai WonderSwan (Color)": "ws",
                            "ColecoVision": "coleco",
                            "Commodore 64": "vice_x64sc",
                            "Commodore 128": "vice_x128",
                            "Commodore VIC20": "vice_xvic",
                            "Commodore Plus/4": "vice_xplus4",
                            "Commodore PET": "vice_xpet",
                        }
                        
                        if (enableThreads) {
                            coreValues["DOSBOX-PURE"] = "dosbox_pure";
                            coreValues["PlayStation Portable"] = "ppsspp";
                        }

                        for (let core in coreValues) {
                            if (core.toLowerCase() === ext) {
                                resolve(core)
                            }
                        }
 
                        const cores = Object.keys(coreValues).sort().reduce(
                            (obj, key) => { 
                                obj[key] = coreValues[key]; 
                                return obj;
                            }, 
                            {}
                        );

                        const button = document.createElement("button")
                        const select = document.createElement("select")

                        for (const type in cores) {
                            const option = document.createElement("option")

                            option.value = cores[type]
                            option.textContent = type
                            select.appendChild(option)
                        }

                        button.onclick = () => resolve(select[select.selectedIndex].value)
                        button.textContent = "Load game"
                        box.innerHTML = ""

                        box.appendChild(select)
                        box.appendChild(button)
                    })
                })(parts.pop())

                const div = document.createElement("div")
                const sub = document.createElement("div")
                const script = document.createElement("script")

                sub.id = "game"
                div.id = "display"

                const top = document.getElementById("top");
                top.remove();
                box.remove()
                div.appendChild(sub)
                document.body.appendChild(div)

                window.EJS_player = "#game";
                window.EJS_gameName = parts.shift();
                window.EJS_biosUrl = "";
                window.EJS_gameUrl = url;
                window.EJS_core = core;
                window.EJS_pathtodata = "data/";
                window.EJS_startOnLoaded = true;
                window.EJS_DEBUG_XX = enableDebug;
                window.EJS_disableDatabases = true;
                window.EJS_threads = enableThreads;
                if (browserMode) {
                    window.EJS_browserMode = browserMode;
                }

                script.src = "data/loader.js";
                document.body.appendChild(script);
            }
            
            input.onchange = async () => {
                run(true);
            }
            
            box.ondragover = () => box.setAttribute("drag", true);
            box.ondragleave = () => box.removeAttribute("drag");
        </script>

        <script>
            //Background Effect (Generated by AI)
            const bgFXcanvas = document.getElementById("bgfx-retro-canvas");
            const bgFXctx = bgFXcanvas.getContext("2d");
            let w = bgFXcanvas.width = window.innerWidth;
            let h = bgFXcanvas.height = window.innerHeight;
            const bgFXparticles = [];
            const bgfxCOUNT = 100; //no. of particles
            const colors = [ //colors
                "#00ffff",
                "#ff00ff",
                "#00ff00",
                "#ffff00",
                "#ff0000"
            ];
            function rand(min, max) {
                return Math.random() * (max - min) + min;
            }
            function createParticle() {
                return {
                    x: rand(0, w),
                    y: rand(0, h),
                    size: rand(2, 6),
                    speedX: rand(-0.4, 0.4),
                    speedY: rand(-0.4, 0.4),
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: rand(0.4, 1)
                };
            }
            function init() {
                bgFXparticles.length = 0;
                for (let i = 0; i < bgfxCOUNT; i++) bgFXparticles.push(createParticle());
            }
            function bgFXdraw() {
                bgFXctx.clearRect(0, 0, w, h);
                const gradient = bgFXctx.createRadialGradient(
                    w/2, h/2, 0,
                    w/2, h/2, Math.max(w, h)
                );
                gradient.addColorStop(0, "rgba(0,0,0,0)");
                gradient.addColorStop(1, "rgba(0,0,0,0.6)");
                bgFXctx.fillStyle = gradient;
                bgFXctx.fillRect(0, 0, w, h);
                for (const p of bgFXparticles) { //draw particles
                    bgFXctx.globalAlpha = p.alpha;
                    bgFXctx.fillStyle = p.color;
                    bgFXctx.fillRect(p.x, p.y, p.size, p.size);
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < -10) p.x = w + 10;
                    if (p.x > w + 10) p.x = -10;
                    if (p.y < -10) p.y = h + 10;
                    if (p.y > h + 10) p.y = -10;
                }
                requestAnimationFrame(bgFXdraw);
            }
            window.addEventListener("resize", () => {
                w = bgFXcanvas.width = window.innerWidth;
                h = bgFXcanvas.height = window.innerHeight;
                init();
            });
            init();
            bgFXdraw();
        </script>

    
    </body>
</html>
